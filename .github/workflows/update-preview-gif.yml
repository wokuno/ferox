name: Update Preview GIF

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  refresh-preview:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve target branch
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BRANCH="${GITHUB_REF_NAME}"
            REF="$BRANCH"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            REF="${{ github.event.workflow_run.head_sha }}"
          fi

          if [ -z "$BRANCH" ] || [ -z "$REF" ]; then
            echo "Unable to determine target branch/ref"
            exit 1
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ steps.target.outputs.ref }}
          persist-credentials: true

      - name: Install uv
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
          fi
          uv --version

      - name: Generate preview GIF
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --with pillow scripts/generate_preview_gif.py --output assets/preview.gif

      - name: Commit updated preview
        run: |
          if git diff --quiet -- assets/preview.gif; then
            echo "No preview changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/preview.gif
          git commit -m "chore: refresh preview gif"
          git push origin "HEAD:${{ steps.target.outputs.branch }}"
