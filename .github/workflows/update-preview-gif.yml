name: Update Preview GIF

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tools/**"
      - "scripts/generate_preview_gif.py"
      - "**/CMakeLists.txt"
      - ".github/workflows/update-preview-gif.yml"

jobs:
  refresh-preview:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Install uv
        run: |
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
          fi
          uv --version

      - name: Generate preview GIF
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --with pillow scripts/generate_preview_gif.py --output assets/preview.gif

      - name: Commit updated preview
        run: |
          if git diff --quiet -- assets/preview.gif; then
            echo "No preview changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/preview.gif
          git commit -m "chore: refresh preview gif [skip ci]"
          git push
