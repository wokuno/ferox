name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Restrict default permissions for all jobs
permissions:
  contents: read

jobs:
  build-and-test-macos:
    strategy:
      matrix:
        build_type: [Release, Debug]

    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          brew install cmake sdl2

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: |
          cmake --build build --config ${{ matrix.build_type }} -j$(sysctl -n hw.ncpu)

      - name: Run tests
        id: run_tests
        shell: bash
        run: |
          set +e
          cd build
          ctest --output-on-failure --timeout 600 -C "${{ matrix.build_type }}" | tee ctest.log
          test_exit_code=${PIPESTATUS[0]}
          python3 - <<'PY'
          import os
          import re

          log_path = "ctest.log"
          with open(log_path, "r", encoding="utf-8", errors="ignore") as f:
              log = f.read()

          passed = 0
          failed = 0
          total = 0

          m = re.search(r"(\d+)% tests passed, (\d+) tests failed out of (\d+)", log)
          if m:
              failed = int(m.group(2))
              total = int(m.group(3))
              passed = total - failed
          else:
              all_pass = re.findall(r"(\d+)/(\d+) Test\s+#\d+:.*?\s+Passed\s+", log)
              if all_pass:
                  passed = len(all_pass)
                  total = int(all_pass[-1][1])
                  failed = total - passed

          status = "passed" if failed == 0 else "failed"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"passed={passed}\n")
              out.write(f"failed={failed}\n")
              out.write(f"total={total}\n")
              out.write(f"status={status}\n")
          PY
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          exit "$test_exit_code"

      - name: Run simulation statistical regression report
        id: stat_regression
        shell: bash
        run: |
          set +e
          cd build
          ctest --output-on-failure --timeout 600 -C "${{ matrix.build_type }}" -R "SimulationStatRegressionTests" -V | tee stat-regression.log
          stat_exit_code=${PIPESTATUS[0]}
          python3 - <<'PY'
          import os
          import re

          metrics = []
          status = "passed"
          log_path = "stat-regression.log"
          pattern = re.compile(
              r"STAT_REGRESSION metric=(?P<metric>\S+) mean=(?P<mean>[-+0-9.eE]+) stddev=(?P<stddev>[-+0-9.eE]+) "
              r"min=(?P<min>[-+0-9.eE]+) max=(?P<max>[-+0-9.eE]+) expected_mean=(?P<expected_mean>[-+0-9.eE]+) "
              r"mean_tol=(?P<mean_tol>[-+0-9.eE]+) expected_stddev=(?P<expected_stddev>[-+0-9.eE]+) "
              r"stddev_tol=(?P<stddev_tol>[-+0-9.eE]+)"
          )

          try:
              with open(log_path, "r", encoding="utf-8", errors="ignore") as f:
                  log_text = f.read()
              for line in log_text.splitlines():
                  m = pattern.search(line)
                  if m:
                      metrics.append(m.groupdict())
              if "Simulation Statistical Regression: FAILED" in log_text or not metrics:
                  status = "failed"
          except FileNotFoundError:
              status = "failed"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"status={status}\n")
              out.write(f"metrics_count={len(metrics)}\n")
              for metric in metrics:
                  key = metric["metric"]
                  out.write(f"{key}_mean={metric['mean']}\n")
                  out.write(f"{key}_stddev={metric['stddev']}\n")
                  out.write(f"{key}_min={metric['min']}\n")
                  out.write(f"{key}_max={metric['max']}\n")
          PY
          exit "$stat_exit_code"

      - name: Summarize test results
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ### Test Summary (macOS ${{ matrix.build_type }})
          - Status: **${{ steps.run_tests.outputs.status || 'failed' }}**
          - Passed: ${{ steps.run_tests.outputs.passed || '0' }}
          - Failed: ${{ steps.run_tests.outputs.failed || '0' }}
          - Total: ${{ steps.run_tests.outputs.total || '0' }}
          - Statistical regression: **${{ steps.stat_regression.outputs.status || 'failed' }}**
          - Statistical metrics captured: ${{ steps.stat_regression.outputs.metrics_count || '0' }}
          - occupied_ratio: mean=${{ steps.stat_regression.outputs.occupied_ratio_mean || 'n/a' }}, stddev=${{ steps.stat_regression.outputs.occupied_ratio_stddev || 'n/a' }}
          - active_colonies: mean=${{ steps.stat_regression.outputs.active_colonies_mean || 'n/a' }}, stddev=${{ steps.stat_regression.outputs.active_colonies_stddev || 'n/a' }}
          - dominant_share: mean=${{ steps.stat_regression.outputs.dominant_share_mean || 'n/a' }}, stddev=${{ steps.stat_regression.outputs.dominant_share_stddev || 'n/a' }}
          - Details: ${{ steps.run_tests.outputs.run_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          EOF

  build-and-test-ferox:
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        build_type: [Release, Debug]

    runs-on: [self-hosted, Linux, X64, ferox, rocky10]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Verify dependencies
        run: |
          cmake --version
          sdl2-config --version

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: |
          cmake --build build --config ${{ matrix.build_type }} -j$(nproc)

      - name: Run tests
        id: run_tests
        shell: bash
        run: |
          set +e
          cd build
          ctest --output-on-failure --timeout 600 -C "${{ matrix.build_type }}" | tee ctest.log
          test_exit_code=${PIPESTATUS[0]}
          python3 - <<'PY'
          import os
          import re

          log_path = "ctest.log"
          with open(log_path, "r", encoding="utf-8", errors="ignore") as f:
              log = f.read()

          passed = 0
          failed = 0
          total = 0

          m = re.search(r"(\d+)% tests passed, (\d+) tests failed out of (\d+)", log)
          if m:
              failed = int(m.group(2))
              total = int(m.group(3))
              passed = total - failed
          else:
              all_pass = re.findall(r"(\d+)/(\d+) Test\s+#\d+:.*?\s+Passed\s+", log)
              if all_pass:
                  passed = len(all_pass)
                  total = int(all_pass[-1][1])
                  failed = total - passed

          status = "passed" if failed == 0 else "failed"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"passed={passed}\n")
              out.write(f"failed={failed}\n")
              out.write(f"total={total}\n")
              out.write(f"status={status}\n")
          PY
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          exit "$test_exit_code"

      - name: Run simulation statistical regression report
        id: stat_regression
        shell: bash
        run: |
          set +e
          cd build
          ctest --output-on-failure --timeout 600 -C "${{ matrix.build_type }}" -R "SimulationStatRegressionTests" -V | tee stat-regression.log
          stat_exit_code=${PIPESTATUS[0]}
          python3 - <<'PY'
          import os
          import re

          metrics = []
          status = "passed"
          log_path = "stat-regression.log"
          pattern = re.compile(
              r"STAT_REGRESSION metric=(?P<metric>\S+) mean=(?P<mean>[-+0-9.eE]+) stddev=(?P<stddev>[-+0-9.eE]+) "
              r"min=(?P<min>[-+0-9.eE]+) max=(?P<max>[-+0-9.eE]+) expected_mean=(?P<expected_mean>[-+0-9.eE]+) "
              r"mean_tol=(?P<mean_tol>[-+0-9.eE]+) expected_stddev=(?P<expected_stddev>[-+0-9.eE]+) "
              r"stddev_tol=(?P<stddev_tol>[-+0-9.eE]+)"
          )

          try:
              with open(log_path, "r", encoding="utf-8", errors="ignore") as f:
                  log_text = f.read()
              for line in log_text.splitlines():
                  m = pattern.search(line)
                  if m:
                      metrics.append(m.groupdict())
              if "Simulation Statistical Regression: FAILED" in log_text or not metrics:
                  status = "failed"
          except FileNotFoundError:
              status = "failed"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"status={status}\n")
              out.write(f"metrics_count={len(metrics)}\n")
              for metric in metrics:
                  key = metric["metric"]
                  out.write(f"{key}_mean={metric['mean']}\n")
                  out.write(f"{key}_stddev={metric['stddev']}\n")
                  out.write(f"{key}_min={metric['min']}\n")
                  out.write(f"{key}_max={metric['max']}\n")
          PY
          exit "$stat_exit_code"

      - name: Summarize test results
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ### Test Summary (ferox Linux ${{ matrix.build_type }})
          - Status: **${{ steps.run_tests.outputs.status || 'failed' }}**
          - Passed: ${{ steps.run_tests.outputs.passed || '0' }}
          - Failed: ${{ steps.run_tests.outputs.failed || '0' }}
          - Total: ${{ steps.run_tests.outputs.total || '0' }}
          - Statistical regression: **${{ steps.stat_regression.outputs.status || 'failed' }}**
          - Statistical metrics captured: ${{ steps.stat_regression.outputs.metrics_count || '0' }}
          - occupied_ratio: mean=${{ steps.stat_regression.outputs.occupied_ratio_mean || 'n/a' }}, stddev=${{ steps.stat_regression.outputs.occupied_ratio_stddev || 'n/a' }}
          - active_colonies: mean=${{ steps.stat_regression.outputs.active_colonies_mean || 'n/a' }}, stddev=${{ steps.stat_regression.outputs.active_colonies_stddev || 'n/a' }}
          - dominant_share: mean=${{ steps.stat_regression.outputs.dominant_share_mean || 'n/a' }}, stddev=${{ steps.stat_regression.outputs.dominant_share_stddev || 'n/a' }}
          - Details: ${{ steps.run_tests.outputs.run_url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          EOF

  coverage-ferox:
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Linux, X64, ferox, rocky10]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Verify dependencies
        run: |
          cmake --version
          sdl2-config --version
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"
          fi
          uv --version

      - name: Configure coverage build
        run: |
          cmake -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

      - name: Build
        run: |
          cmake --build build-coverage -j$(nproc)

      - name: Run tests for coverage
        run: |
          cd build-coverage
          ctest --output-on-failure --timeout 600 -C Debug -E "(PerformanceEvalTests|AllTests)"

      - name: Generate coverage summary
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uvx gcovr --root . --gcov-ignore-parse-errors=suspicious_hits.warn_once_per_file --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --print-summary --txt > coverage-summary.txt
          uvx gcovr --root . --gcov-ignore-parse-errors=suspicious_hits.warn_once_per_file --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --xml-pretty --output coverage.xml
          cat coverage-summary.txt

      - name: Add coverage to job summary
        run: |
          {
            echo "### Coverage Summary (ferox Linux)";
            echo "";
            sed -n '1,20p' coverage-summary.txt;
          } >> "$GITHUB_STEP_SUMMARY"

  coverage-macos:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          brew install cmake sdl2 uv

      - name: Configure coverage build
        run: |
          cmake -B build-coverage -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON

      - name: Build
        run: |
          cmake --build build-coverage -j$(sysctl -n hw.ncpu)

      - name: Run tests for coverage
        run: |
          cd build-coverage
          ctest --output-on-failure --timeout 600 -C Debug -E "(PerformanceEvalTests|AllTests)"

      - name: Generate coverage summary
        run: |
          uvx gcovr --root . --gcov-ignore-parse-errors=suspicious_hits.warn_once_per_file --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --print-summary --txt > coverage-summary.txt
          uvx gcovr --root . --gcov-ignore-parse-errors=suspicious_hits.warn_once_per_file --gcov-ignore-parse-errors=negative_hits.warn_once_per_file --xml-pretty --output coverage.xml
          cat coverage-summary.txt

      - name: Add coverage to job summary
        run: |
          {
            echo "### Coverage Summary (ferox Linux)";
            echo "";
            sed -n '1,20p' coverage-summary.txt;
          } >> "$GITHUB_STEP_SUMMARY"

  pr-test-summary:
    if: always() && github.event_name == 'pull_request'
    needs: [build-and-test-macos]
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Post consolidated PR test summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          run_id = os.environ["RUN_ID"]
          run_url = os.environ["RUN_URL"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          jobs_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100"
          req = urllib.request.Request(jobs_url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              jobs = json.load(resp).get("jobs", [])

          tracked = []
          for job in jobs:
              name = job.get("name", "")
              if name.startswith("build-and-test-") or name.startswith("coverage-"):
                  tracked.append({
                      "name": name,
                      "conclusion": job.get("conclusion", "unknown"),
                      "url": job.get("html_url", run_url),
                  })

          tracked.sort(key=lambda x: x["name"])

          emoji = {
              "success": "✅",
              "failure": "❌",
              "cancelled": "⚪",
              "skipped": "⏭️",
          }

          lines = ["<!-- ci-test-summary:consolidated -->", "### CI Test Summary (Consolidated)"]
          for item in tracked:
              icon = emoji.get(item["conclusion"], "❔")
              lines.append(f"- {icon} `{item['name']}`: **{item['conclusion']}** ([details]({item['url']}))")

          overall = "success" if tracked and all(i["conclusion"] in ("success", "skipped") for i in tracked) else "failure"
          lines.append(f"- Overall: **{overall}**")
          lines.append(f"- Full run: {run_url}")
          body = "\n".join(lines)

          comments_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100"
          req = urllib.request.Request(comments_url, headers=headers)
          with urllib.request.urlopen(req) as resp:
              comments = json.load(resp)

          marker = "<!-- ci-test-summary:consolidated -->"
          existing = next((c for c in comments if marker in c.get("body", "")), None)

          if existing:
              update_url = f"https://api.github.com/repos/{repo}/issues/comments/{existing['id']}"
              req = urllib.request.Request(
                  update_url,
                  data=json.dumps({"body": body}).encode("utf-8"),
                  headers={**headers, "Content-Type": "application/json"},
                  method="PATCH",
              )
              urllib.request.urlopen(req).read()
          else:
              create_url = f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments"
              req = urllib.request.Request(
                  create_url,
                  data=json.dumps({"body": body}).encode("utf-8"),
                  headers={**headers, "Content-Type": "application/json"},
                  method="POST",
              )
              urllib.request.urlopen(req).read()
          PY
